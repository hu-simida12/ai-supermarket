<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <meta name="keywords" content="AI工具,AI超市,人工智能工具,ChatGPT,Midjourney,AI导航,AI工具箱">

    <meta property="og:description" content="157款主流AI工具，26大分类，提供详细介绍和下载引导。">

    <meta name="twitter:title" content="AI超市 - 主流AI工具一站式探索平台">
    <link rel="canonical" href="https://ai-supermarket.pages.dev">
    <!-- 微信JS-SDK兼容 -->
    <style>
        :root {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #273449;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #8b5cf6;
            --accent-light: #a78bfa;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --border: #334155;
            --tag-bg: #1e293b;
            --tag-text: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        * { -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* 星空背景 */
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* 头部 */
        .header {
            position: relative; z-index: 10;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky; top: 0;
        }
        .header-inner {
            max-width: 1320px; margin: 0 auto; padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 16px;
        }
        .logo {
            display: flex; align-items: center; gap: 12px;
            font-size: 1.6rem; font-weight: 800; color: var(--text);
            text-decoration: none;
        }
        .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: white;
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .logo-sub {
            font-size: 0.8rem; color: var(--accent-light);
            font-weight: 500; letter-spacing: 0.05em;
        }
        .search-box {
            display: flex; align-items: center; gap: 8px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 50px; padding: 8px 8px 8px 20px;
            min-width: 320px; transition: var(--transition);
        }
        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .search-box input {
            background: none; border: none; color: var(--text);
            font-size: 0.95rem; outline: none; flex: 1; min-width: 180px;
        }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-btn {
            background: var(--accent); border: none; color: white;
            width: 38px; height: 38px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; transition: var(--transition); flex-shrink: 0;
        }
        .search-btn:hover { background: #7c3aed; transform: scale(1.05); }
        .header-stats {
            display: flex; gap: 20px; align-items: center;
        }
        .header-stat {
            text-align: center;
        }
        .header-stat-num {
            font-size: 1.3rem; font-weight: 700;
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-stat-label { font-size: 0.75rem; color: var(--text-muted); }

        /* 主体布局 */
        .main-container {
            max-width: 1320px; margin: 0 auto; padding: 24px;
            display: flex; gap: 24px; position: relative; z-index: 1;
        }

        /* 侧边栏 */
        .sidebar {
            width: 240px; flex-shrink: 0;
            position: sticky; top: 100px; align-self: flex-start;
            max-height: calc(100vh - 120px); overflow-y: auto;
        }
        .sidebar-title {
            font-size: 0.85rem; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.1em;
            margin-bottom: 12px; padding-left: 4px;
        }
        .category-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
        .category-item { }
        .category-link {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; border-radius: var(--radius-sm);
            color: var(--text-muted); text-decoration: none;
            font-size: 0.9rem; transition: var(--transition);
            cursor: pointer; border: none; background: none; width: 100%; text-align: left;
        }
        .category-link:hover { background: var(--bg-card); color: var(--text); }
        .category-link.active {
            background: var(--accent); color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .category-icon { font-size: 1.1rem; width: 24px; text-align: center; flex-shrink: 0; }
        .category-count {
            margin-left: auto; font-size: 0.75rem;
            background: var(--bg); padding: 2px 8px; border-radius: 20px;
        }
        .category-link.active .category-count {
            background: rgba(255,255,255,0.25);
        }

        /* 内容区 */
        .content { flex: 1; min-width: 0; }

        /* 分类标题 */
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
        }
        .section-title {
            font-size: 1.5rem; font-weight: 700;
            display: flex; align-items: center; gap: 10px;
        }
        .section-count {
            font-size: 0.9rem; font-weight: 500; color: var(--text-muted);
            background: var(--bg-card); padding: 4px 14px; border-radius: 20px;
        }
        .sort-btns { display: flex; gap: 6px; }
        .sort-btn {
            padding: 6px 14px; border-radius: 20px; font-size: 0.82rem;
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-muted); cursor: pointer; transition: var(--transition);
        }
        .sort-btn:hover { border-color: var(--accent); color: var(--text); }
        .sort-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

        /* 工具卡片网格 */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 18px;
        }
        .tool-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .tool-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent), #6366f1);
            opacity: 0; transition: var(--transition);
        }
        .tool-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(139, 92, 246, 0.15);
        }
        .tool-card:hover::before { opacity: 1; }
        .tool-card-header {
            display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px;
        }
        .tool-icon {
            width: 52px; height: 52px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; flex-shrink: 0;
            background: var(--bg);
        }
        .tool-icon-img { width: 52px; height: 52px; border-radius: 14px; object-fit: cover; flex-shrink: 0; }
        .tool-name-area { flex: 1; min-width: 0; }
        .tool-name {
            font-size: 1.1rem; font-weight: 700; color: var(--text);
            margin-bottom: 2px;
        }
        .tool-vendor {
            font-size: 0.8rem; color: var(--text-muted);
        }
        .tool-rating {
            display: flex; align-items: center; gap: 4px; font-size: 0.82rem;
            color: var(--warning); margin-top: 4px;
        }
        .tool-desc {
            font-size: 0.88rem; color: var(--text-muted);
            line-height: 1.5; margin-bottom: 14px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .tool-tags {
            display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
        }
        .tool-tag {
            font-size: 0.72rem; padding: 4px 10px; border-radius: 20px;
            background: var(--tag-bg); color: var(--tag-text);
            border: 1px solid var(--border);
        }
        .tool-tag.hot {
            background: rgba(239, 68, 68, 0.15); color: #fca5a5; border-color: rgba(239, 68, 68, 0.3);
        }
        .tool-tag.free {
            background: rgba(16, 185, 129, 0.15); color: #6ee7b7; border-color: rgba(16, 185, 129, 0.3);
        }
        .tool-actions {
            display: flex; gap: 8px;
        }
        .btn {
            padding: 8px 16px; border-radius: 8px; font-size: 0.85rem;
            font-weight: 600; cursor: pointer; transition: var(--transition);
            display: inline-flex; align-items: center; gap: 6px;
            text-decoration: none; border: none;
        }
        .btn-primary {
            background: var(--accent); color: white;
        }
        .btn-primary:hover { background: #7c3aed; box-shadow: 0 4px 12px var(--accent-glow); }
        .btn-outline {
            background: transparent; color: var(--text); border: 1px solid var(--border);
        }
        .btn-outline:hover { border-color: var(--accent); background: var(--bg-card-hover); }
        .btn-sm { padding: 5px 12px; font-size: 0.78rem; border-radius: 6px; }

        /* 空状态 */
        .empty-state {
            text-align: center; padding: 80px 20px; color: var(--text-muted);
        }
        .empty-state-icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.5; }
        .empty-state h3 { font-size: 1.3rem; margin-bottom: 8px; color: var(--text); }
        .empty-state p { font-size: 0.9rem; }

        /* 弹窗 */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            padding: 24px; animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); max-width: 640px; width: 100%;
            max-height: 85vh; overflow-y: auto; animation: slideUp 0.3s ease;
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
        }
        .modal-header {
            padding: 24px 24px 0; display: flex; align-items: flex-start; gap: 16px;
            position: sticky; top: 0; background: var(--bg-card); z-index: 1;
        }
        .modal-close {
            margin-left: auto; background: var(--bg); border: 1px solid var(--border);
            color: var(--text-muted); width: 36px; height: 36px; border-radius: 50%;
            cursor: pointer; font-size: 1.1rem; display: flex; align-items: center;
            justify-content: center; transition: var(--transition); flex-shrink: 0;
        }
        .modal-close:hover { color: var(--text); border-color: var(--text-muted); }
        .modal-body { padding: 20px 24px 24px; }
        .modal .tool-icon, .modal .tool-icon-img { width: 64px; height: 64px; border-radius: 16px; }
        .modal .tool-name { font-size: 1.4rem; }
        .modal .tool-desc { font-size: 0.95rem; -webkit-line-clamp: unset; overflow: visible; }
        .detail-section { margin-bottom: 20px; }
        .detail-section h4 {
            font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 0.08em; margin-bottom: 10px;
        }
        .detail-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .detail-item {
            background: var(--bg); padding: 12px 16px; border-radius: var(--radius-sm);
        }
        .detail-label { font-size: 0.75rem; color: var(--text-muted); }
        .detail-value { font-size: 0.9rem; font-weight: 600; margin-top: 2px; }
        .detail-features {
            list-style: none; display: flex; flex-direction: column; gap: 6px;
        }
        .detail-features li {
            font-size: 0.88rem; padding-left: 20px; position: relative;
            color: var(--text-muted);
        }
        .detail-features li::before {
            content: '✦'; position: absolute; left: 0; color: var(--accent-light);
        }

        /* 响应式 - 平板 */
        @media (max-width: 1024px) {
            .main-container { padding: 16px; gap: 16px; }
            .sidebar { width: 200px; }
            .tools-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; padding: 12px; }
            .sidebar {
                width: 100%; position: static; max-height: none;
                overflow-x: auto; -webkit-overflow-scrolling: touch;
                padding-bottom: 4px; margin-bottom: 8px;
            }
            .sidebar-title { display: none; }
            .category-list { flex-direction: row; flex-wrap: nowrap; gap: 4px; }
            .category-link { white-space: nowrap; padding: 8px 12px; font-size: 0.82rem; border-radius: 20px; }
            .category-count { display: none; }
            .tools-grid { grid-template-columns: 1fr; gap: 12px; }
            .search-box { min-width: 0; flex: 1; padding: 6px 6px 6px 14px; }
            .search-box input { font-size: 0.9rem; }
            .header-inner { gap: 10px; padding: 0 16px; }
            .header-stats { display: none; }
            .header { padding: 12px 0; }
            .logo { font-size: 1.3rem; }
            .logo-icon { width: 36px; height: 36px; font-size: 1.2rem; border-radius: 10px; }
            .section-title { font-size: 1.2rem; }
            .modal { margin: 12px; max-height: 92vh; max-height: 92dvh; border-radius: 14px; }
            .modal-header { padding: 16px 16px 0; }
            .modal-body { padding: 14px 16px 20px; }
            .modal .tool-name { font-size: 1.2rem; }
            .tool-card { padding: 16px; }
            .tool-card-header { gap: 10px; }
            .tool-icon, .tool-icon-img { width: 44px; height: 44px; border-radius: 12px; font-size: 1.4rem; }
            .tool-name { font-size: 1rem; }
        }

        /* 手机端 */
        @media (max-width: 480px) {
            .tools-grid { grid-template-columns: 1fr; gap: 10px; }
            .tool-actions { flex-direction: column; }
            .btn { justify-content: center; width: 100%; }
            .detail-grid { grid-template-columns: 1fr; }
            .search-box { min-width: 0; flex: 1; }
            .header-inner { padding: 0 12px; }
            .logo-sub { display: none; }
            .logo { gap: 8px; }
            .logo-icon { width: 32px; height: 32px; font-size: 1rem; border-radius: 8px; }
            .section-header { gap: 8px; }
            .sort-btns { width: 100%; justify-content: flex-start; }
            .sort-btn { font-size: 0.75rem; padding: 4px 10px; }
            .tool-card { padding: 14px; border-radius: 12px; }
            .tool-desc { font-size: 0.82rem; }
            .tool-tag { font-size: 0.68rem; padding: 3px 8px; }
            .modal-overlay { padding: 8px; }
            .modal { margin: 0; max-height: 96vh; max-height: 96dvh; border-radius: 12px; }
            .modal .tool-icon, .modal .tool-icon-img { width: 48px; height: 48px; border-radius: 12px; }
            .footer { padding: 24px 16px; font-size: 0.75rem; }
        }

        /* 小屏手机 */
        @media (max-width: 360px) {
            .tool-card { padding: 12px; }
            .tool-name { font-size: 0.95rem; }
            .tool-desc { font-size: 0.78rem; }
            .btn-sm { font-size: 0.72rem; padding: 4px 10px; }
        }

        /* 大屏优化 */
        @media (min-width: 1600px) {
            .tools-grid { grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); }
            .main-container { max-width: 1500px; }
            .header-inner { max-width: 1500px; }
        }

        /* 暗色主题 - 系统偏好 */
        @media (prefers-color-scheme: dark) {
            /* 默认就是暗色，无需额外 */
        }
        @media (prefers-color-scheme: light) {
            /* 强制暗色主题 */
            body { background: var(--bg) !important; color: var(--text) !important; }
        }

        /* 减少动画偏好 */
        @media (prefers-reduced-motion: reduce) {
            .star { animation: none; opacity: 0.3; }
            .tool-card { transition: none; }
            .tool-card:hover { transform: none; }
        }

        /* 触摸设备 */
        @media (hover: none) and (pointer: coarse) {
            .tool-card:hover { transform: none; border-color: var(--border); }
            .tool-card:hover::before { opacity: 0; }
            .tool-card:active { transform: scale(0.98); background: var(--bg-card-hover); }
            .btn:active { transform: scale(0.96); }
            .category-link:active { transform: scale(0.95); }
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* 页脚 */
        .footer {
            text-align: center; padding: 40px 24px;
            color: var(--text-muted); font-size: 0.85rem;
            border-top: 1px solid var(--border); position: relative; z-index: 1;
            margin-top: 40px;
        }
        .footer a { color: var(--accent-light); text-decoration: none; }
        .stats-bar strong { color: var(--accent-light); }
        .stats-bar span { white-space: nowrap; }
        @media (max-width: 480px) {
            .stats-bar { gap: 12px !important; font-size: 0.75rem !important; }
            .stats-bar button { font-size: 0.7rem !important; padding: 3px 10px !important; }
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>

    <!-- 头部 -->
    <header class="header">
        <div class="header-inner">
            <a href="#" class="logo" onclick="resetAll()">
                <div class="logo-icon">🛒</div>
                <div>
                    <div>AI超市</div>
                    <div class="logo-sub">AI TOOLS MARKET</div>
                </div>
            </a>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索AI工具名称、分类或功能..." oninput="filterTools()">
                <button class="search-btn" onclick="filterTools()">🔍</button>
            </div>
            <div class="header-stats">
                <div class="header-stat">
                    <div class="header-stat-num" id="totalTools">0</div>
                    <div class="header-stat-label">收录工具</div>
                </div>
                <div class="header-stat">
                    <div class="header-stat-num" id="totalCats">0</div>
                    <div class="header-stat-label">分类覆盖</div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主体 -->
    <div class="main-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">📂 工具分类</div>
            <ul class="category-list" id="categoryList"></ul>
        </aside>
        <main class="content">
            <div class="section-header">
                <div class="section-title">
                    <span id="sectionIcon">🏪</span>
                    <span id="sectionName">全部工具</span>
                    <span class="section-count" id="sectionCount">0 个工具</span>
                </div>
                <div class="sort-btns">
                    <button class="sort-btn active" onclick="setSort('default')">📋 默认排序</button>
                    <button class="sort-btn" onclick="setSort('rating')">⭐ 评分优先</button>
                    <button class="sort-btn" onclick="setSort('name')">🔤 名称排序</button>
                </div>
            </div>
            <div class="tools-grid" id="toolsGrid"></div>

        // ============ 全局状态 ============
        let activeCategory = 'all';

        // ============ 访问统计系统 ============
        const STATS_KEY = 'ai_supermarket_stats';
        function getStats() {
            try { return JSON.parse(localStorage.getItem(STATS_KEY)) || {}; } catch(e) { return {}; }
        }
        function saveStats(s) { localStorage.setItem(STATS_KEY, JSON.stringify(s)); }

        function recordVisit() {
            const now = new Date();
            const dayKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const monthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
            const quarter = Math.floor(now.getMonth() / 3) + 1;
            const quarterKey = `${now.getFullYear()}-Q${quarter}`;
            const yearKey = `${now.getFullYear()}`;
            const stats = getStats();
            stats[dayKey] = (stats[dayKey] || 0) + 1;
            stats[monthKey] = (stats[monthKey] || 0) + 1;
            stats[quarterKey] = (stats[quarterKey] || 0) + 1;
            stats[yearKey] = (stats[yearKey] || 0) + 1;
            stats._total = (stats._total || 0) + 1;
            // 记录最近30天每日数据
            stats._daily = stats._daily || {};
            stats._daily[dayKey] = (stats._daily[dayKey] || 0) + 1;
            // 清理超过90天的每日数据
            const cutoff = new Date(now - 90*86400000).toISOString().slice(0,10);
            for (const k of Object.keys(stats._daily)) { if (k < cutoff) delete stats._daily[k]; }
            saveStats(stats);
            updateStatsDisplay();
        }

        function updateStatsDisplay() {
            const now = new Date();
            const dayKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const monthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
            const quarter = Math.floor(now.getMonth() / 3) + 1;
            const quarterKey = `${now.getFullYear()}-Q${quarter}`;
            const yearKey = `${now.getFullYear()}`;
            const stats = getStats();
            const el = (id) => document.getElementById(id);
            const setVal = (id, v) => { const e = el(id); if (e) e.textContent = v; };
            setVal('statToday', (stats[dayKey] || 0).toLocaleString());
            setVal('statMonth', (stats[monthKey] || 0).toLocaleString());
            setVal('statQuarter', (stats[quarterKey] || 0).toLocaleString());
            setVal('statYear', (stats[yearKey] || 0).toLocaleString());
            setVal('statTotal', (stats._total || 0).toLocaleString());
        }

            const quarterKey = `${now.getFullYear()}-Q${quarter}`;
            const yearKey = `${now.getFullYear()}`;

            // 生成最近30天数据
            const daily = stats._daily || {};
            const days = [];
            for (let i = 29; i >= 0; i--) {
                const d = new Date(now - i*86400000);
                const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                days.push({ date: `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`, count: daily[k] || 0 });
            }
            const maxCount = Math.max(1, ...days.map(d=>d.count));
            const barChart = days.map(d => {
                const h = Math.max(4, Math.round((d.count / maxCount) * 120));
                const isToday = d.date === `${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;

            document.getElementById('statsPanelBody').innerHTML = `

                        <div class="detail-item"><div class="detail-label">📅 本月累计</div><div class="detail-value" style="font-size:1.3rem;">${(stats[monthKey]||0).toLocaleString()}</div></div>
                        <div class="detail-item"><div class="detail-label">📊 本季累计</div><div class="detail-value" style="font-size:1.3rem;">${(stats[quarterKey]||0).toLocaleString()}</div></div>
                        <div class="detail-item"><div class="detail-label">📈 全年累计</div><div class="detail-value" style="font-size:1.3rem;">${(stats[yearKey]||0).toLocaleString()}</div></div>
                    </div>
                    <div style="margin-top:12px;background:var(--bg);padding:12px 16px;border-radius:10px;text-align:center;">
                        <span style="color:var(--text-muted);">🕐 历史累计总访问量：</span>
                        <strong style="font-size:1.5rem;background:linear-gradient(135deg,#8b5cf6,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">${(stats._total||0).toLocaleString()}</strong>
                    </div>
                </div>
                <div class="detail-section">
                    <h4>📈 最近30天趋势</h4>
                    <div style="display:flex;align-items:flex-end;gap:2px;overflow-x:auto;padding:16px 8px 8px;background:var(--bg);border-radius:10px;min-height:160px;justify-content:center;">
                        ${barChart}
                    </div>
                </div>
                ${monthList.length > 0 ? `
                <div class="detail-section">
                    <h4>📅 月度统计</h4>
                    <div class="detail-grid">
                        ${monthList.map(([k,v]) => {
                            const [y,m] = k.split('-');
                            const isCurrent = k === monthKey;
                            return `<div class="detail-item" style="${isCurrent?'border:1px solid var(--accent);':''}"><div class="detail-label">${y}年${m}月${isCurrent?' (当前)':''}</div><div class="detail-value">${v.toLocaleString()} 次</div></div>`;
                        }).join('')}
                    </div>
                </div>`:''}
                ${quarterList.length > 0 ? `
                <div class="detail-section">
                    <h4>📊 季度统计</h4>
                    <div class="detail-grid">
                        ${quarterList.map(([k,v]) => {
                            const isCurrent = k === quarterKey;
                            return `<div class="detail-item" style="${isCurrent?'border:1px solid var(--accent);':''}"><div class="detail-label">${k}${isCurrent?' (当前)':''}</div><div class="detail-value">${v.toLocaleString()} 次</div></div>`;
                        }).join('')}
                    </div>
                </div>`:''}
                ${yearList.length > 0 ? `
                <div class="detail-section">
                    <h4>📈 年度统计</h4>
                    <div class="detail-grid">
                        ${yearList.map(([k,v]) => {
                            const isCurrent = k === yearKey;
                            return `<div class="detail-item" style="${isCurrent?'border:1px solid var(--accent);':''}"><div class="detail-label">${k}年${isCurrent?' (当前)':''}</div><div class="detail-value">${v.toLocaleString()} 次</div></div>`;
                        }).join('')}
                    </div>
                </div>`:''}
                <div class="detail-section">
                    <p style="font-size:0.78rem;color:var(--text-muted);text-align:center;">
                        ⚠️ 数据存储在浏览器本地，仅统计当前设备/浏览器的访问次数。<br>
                        如需全平台统一统计，请前往 <a href="https://www.goatcounter.com/signup" target="_blank" style="color:var(--accent-light);">GoatCounter</a> 注册免费账号。
                    </p>
                </div>
            `;
            document.getElementById('statsPanelOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeStatsPanel() {
            document.getElementById('statsPanelOverlay').style.display = 'none';
            document.body.style.overflow = '';
        }

        // ============ 初始化 ============
        function init() {
            recordVisit();
            createStars();
            renderCategories();
            updateStats();
            renderTools();
            document.getElementById('totalTools').textContent = tools.length;
            document.getElementById('totalCats').textContent = categories.length - 1;
        }

        // 星空背景
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = Math.random() * 2.5 + 1 + 'px';
                star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
                star.style.setProperty('--delay', Math.random() * 3 + 's');
                container.appendChild(star);
            }
        }

        // 渲染分类列表
        function renderCategories() {
            const list = document.getElementById('categoryList');
            list.innerHTML = categories.map(cat => {
                const count = cat.id === 'all' ? tools.length : tools.filter(t => t.cat === cat.id).length;
                return `
                    <li class="category-item">
                        <button class="category-link ${cat.id === activeCategory ? 'active' : ''}"
                                onclick="selectCategory('${cat.id}')">
                            <span class="category-icon">${cat.icon}</span>
                            ${cat.name}
                            <span class="category-count">${count}</span>
                        </button>
                    </li>
                `;
            }).join('');
        }

        // 选择分类
        function selectCategory(catId) {
            activeCategory = catId;
            document.querySelectorAll('.category-link').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.trim().startsWith(
                    categories.find(c => c.id === catId)?.icon || ''));
            });
            renderCategories();
            updateSectionHeader();
            renderTools();
            // 移动端滚动到内容区
            if (window.innerWidth <= 900) {
                document.querySelector('.content').scrollIntoView({ behavior: 'smooth' });
            }
        }

        // 更新区域标题
        function updateSectionHeader() {
            const cat = categories.find(c => c.id === activeCategory);
            if (cat) {
                document.getElementById('sectionIcon').textContent = cat.icon;
                document.getElementById('sectionName').textContent = cat.name;
            }
        }

        // 更新统计
        function updateStats() {
            document.getElementById('totalTools').textContent = tools.length;
            document.getElementById('totalCats').textContent = categories.length - 1;
        }

        // 排序
        function setSort(sort) {
            activeSort = sort;
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.sort-btn[onclick="setSort('${sort}')"]`)?.classList.add('active');
            renderTools();
        }

        // 获取过滤后的工具列表
        function getFilteredTools() {
            let filtered = [...tools];

            // 分类过滤
            if (activeCategory !== 'all') {
                filtered = filtered.filter(t => t.cat === activeCategory);
            }

            // 搜索过滤
            if (searchQuery.trim()) {
                const q = searchQuery.toLowerCase();
                filtered = filtered.filter(t =>
                    t.name.toLowerCase().includes(q) ||
                    t.vendor.toLowerCase().includes(q) ||
                    t.desc.toLowerCase().includes(q) ||
                    t.tags.some(tag => tag.toLowerCase().includes(q)) ||
                    t.features.some(f => f.toLowerCase().includes(q)) ||
                    (categories.find(c => c.id === t.cat)?.name || '').includes(q)
                );
            }

            // 排序
            if (activeSort === 'rating') {
                filtered.sort((a, b) => b.rating - a.rating);
            } else if (activeSort === 'name') {
                filtered.sort((a, b) => a.name.localeCompare(b.name, 'zh'));
            } else {
                // 默认：热门优先，然后按评分
                filtered.sort((a, b) => (b.hot ? 1 : 0) - (a.hot ? 1 : 0) || b.rating - a.rating);
            }

            return filtered;
        }

        // 搜索
        function filterTools() {
            searchQuery = document.getElementById('searchInput').value;
            renderTools();
        }

        // 渲染工具卡片

            const filtered = getFilteredTools();
            const grid = document.getElementById('toolsGrid');

            if (filtered.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'block';
            } else {
                empty.style.display = 'none';
                grid.innerHTML = filtered.map(tool => {
                    const catName = categories.find(c => c.id === tool.cat)?.name || '';
                    const starsHtml = '⭐'.repeat(Math.floor(tool.rating));
                    return `
                        <div class="tool-card" onclick="openDetail(${tool.id})">
                            <div class="tool-card-header">
                                <div class="tool-icon">${getToolEmoji(tool.cat)}</div>
                                <div class="tool-name-area">
                                    <div class="tool-name">${tool.name}</div>
                                    <div class="tool-vendor">${tool.vendor}</div>
                                    <div class="tool-rating">${starsHtml} ${tool.rating}</div>
                                </div>
                            </div>
                            <div class="tool-desc">${tool.desc}</div>
                            <div class="tool-tags">
                                ${tool.tags.map(tag => {
                                    let cls = 'tool-tag';
                                    if (tag === '热门' || tag === 'hot') cls += ' hot';
                                    if (tag === '免费' || tag === 'free') cls += ' free';
                                    return `<span class="${cls}">${tag}</span>`;
                                }).join('')}
                                <span class="tool-tag">${catName}</span>
                            </div>
                            <div class="tool-actions" onclick="event.stopPropagation()">
                                <a href="${tool.website}" target="_blank" rel="noopener" class="btn btn-primary btn-sm">🔗 访问官网</a>
                                <button class="btn btn-outline btn-sm" onclick="openDetail(${tool.id})">📋 查看详情</button>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        // 获取分类emoji
        function getToolEmoji(catId) {
            const map = {
                'chatbot': '💬', 'llm': '🧠', 'image-gen': '🎨', 'image-edit': '✂️',
                'video-gen': '🎬', 'video-edit': '🎞️', 'voice': '🎵', 'writing': '✍️',
                'code': '💻', 'design': '🎯', 'office': '📊', 'search': '🔬',
                'marketing': '📈', 'education': '📚', 'ecommerce': '🛍️', 'agent': '🤖',
                '3d': '🧊', 'digital-human': '👤', 'data': '📉', 'automation': '⚡',
                'browser': '🌐', 'finance': '⚖️', 'health': '🏥', 'hr': '👥',
                'translation': '🌍', 'pdf': '📄'
            };
            return map[catId] || '🤖';
        }

        // 打开详情弹窗
        function openDetail(toolId) {
            const tool = tools.find(t => t.id === toolId);
            if (!tool) return;

            const catName = categories.find(c => c.id === tool.cat)?.name || '';
            const starsHtml = '⭐'.repeat(Math.floor(tool.rating));

            document.getElementById('modalHeader').innerHTML = `
                <div class="tool-icon" style="width:64px;height:64px;font-size:2rem;">${getToolEmoji(tool.cat)}</div>
                <div class="tool-name-area">
                    <div class="tool-name">${tool.name}</div>
                    <div class="tool-vendor">${tool.vendor}</div>
                    <div class="tool-rating">${starsHtml} ${tool.rating} · ${catName}</div>
                </div>
                <button class="modal-close" onclick="closeModalDirect()">✕</button>
            `;

            document.getElementById('modalBody').innerHTML = `
                <div class="detail-section">
                    <h4>📝 简介</h4>
                    <p class="tool-desc">${tool.desc}</p>
                </div>
                <div class="detail-section">
                    <h4>✨ 核心功能</h4>
                    <ul class="detail-features">
                        ${tool.features.map(f => `<li>${f}</li>`).join('')}
                    </ul>
                </div>
                <div class="detail-section">
                    <h4>📊 基本信息</h4>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <div class="detail-label">💰 价格</div>
                            <div class="detail-value">${tool.pricing}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">⭐ 评分</div>
                            <div class="detail-value">${tool.rating} / 5.0</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">🏷️ 分类</div>
                            <div class="detail-value">${catName}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">🏢 厂商</div>
                            <div class="detail-value">${tool.vendor}</div>
                        </div>
                    </div>
                </div>
                <div class="detail-section">
                    <div style="display:flex;gap:10px;flex-wrap:wrap;">
                        ${tool.tags.map(tag => {
                            let cls = 'tool-tag';
                            if (tag === '热门' || tag === 'hot') cls += ' hot';
                            if (tag === '免费' || tag === 'free') cls += ' free';
                            return `<span class="${cls}">${tag}</span>`;
                        }).join('')}
                    </div>
                </div>
                <div style="margin-top:20px;">
                    <a href="${tool.website}" target="_blank" rel="noopener" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
                        🔗 访问官网下载使用
                    </a>
                </div>
            `;

            document.getElementById('modalOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal(event) {
            if (event.target === document.getElementById('modalOverlay')) {
                closeModalDirect();
            }
        }

        function closeModalDirect() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.body.style.overflow = '';
        }

        function resetAll() {
            activeCategory = 'all';
            activeSort = 'default';
            searchQuery = '';
            document.getElementById('searchInput').value = '';
            renderCategories();
            updateSectionHeader();
            renderTools();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 键盘快捷键
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') { closeModalDirect(); closeStatsPanel(); }
            if (e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });

        // 启动
        init();
    </script>
</body>
</html>
